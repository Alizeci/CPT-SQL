name: Light Benchmark — PR Degradation Gate

on:
  workflow_call:
    inputs:
      schema-script:
        description: 'Path to DDL script for the mirror database'
        required: true
        type: string
      jar-path:
        description: 'Path to the executable JAR'
        required: false
        type: string
        default: 'build/libs/app.jar'
      rows-per-table:
        description: 'Synthetic rows per table for the mirror DB'
        required: false
        type: number
        default: 10000
    secrets:
      DB_URL:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Remove previous mirror container
        run: docker rm -f cpt-sql-mirror || true

      - name: Prune unused Docker images and volumes
        run: |
          docker image prune -f
          docker volume prune -f

      - name: Phase 1 — Compile and generate queries.json
        run: ./gradlew compileJava

      - name: Build executable JAR
        run: ./gradlew bootJar

      - name: Phase 2 — Capture PR SQL
        run: |
          if [ -f "load-profile.json" ]; then
            echo "[Phase 2] load-profile.json found — capturing PR SQL only (20s)."
            SIMULATION_SECS=20 ./gradlew runSimulator
            mv load-profile.json load-profile-pr.json
            git checkout -- load-profile.json
            echo "LOAD_PROFILE_PATH=load-profile.json" >> $GITHUB_ENV
            echo "PR_SQL_PATH=load-profile-pr.json"   >> $GITHUB_ENV
          else
            echo "::warning::load-profile.json not found. Running temporary capture."
            SIMULATION_SECS=120 ./gradlew runSimulator
            echo "LOAD_PROFILE_PATH=load-profile.json" >> $GITHUB_ENV
            echo "PR_SQL_PATH=load-profile.json"       >> $GITHUB_ENV
          fi
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Phases 3+4 — Benchmark and degradation detection
        run: |
          java -jar ${{ inputs.jar-path }} \
            --loadtest.benchmark.testProfile=light \
            --loadtest.synthetic.rowsPerTable=${{ inputs.rows-per-table }} \
            --loadtest.baseline.path=baseline.json \
            --loadtest.profile.path="$LOAD_PROFILE_PATH" \
            --loadtest.profile.sqlPath="$PR_SQL_PATH" \
            --loadtest.mirror.schema.script=${{ inputs.schema-script }}
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Post warnings on PR
        if: always() && hashFiles('benchmark-warnings.txt') != ''
        run: |
          BODY=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" < benchmark-warnings.txt)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $BODY}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            load-profile.json
            load-profile-pr.json
            baseline.json
            build/results/
            build/validation/
