name: Light Benchmark — Detección de degradación en PRs

# Corre en cada Pull Request hacia main, develop o qa.
# Detecta degradaciones de rendimiento introducidas por el código del PR
# antes de mergear. Bloquea el merge si detecta P95_EXCEEDED o SLO_PROXIMITY.
# Runner: self-hosted (VM Ubuntu dedicada — entorno consistente y reproducible).
#
# Perfil: light — warmup 10s + medición 30s, 10 TPS, 10k rows sintéticos.
# Baseline: baseline.json (independiente del nightly).
#
# ARQUITECTURA:
# 1. Fase 2 mini (20s): EcommerceSimulator captura el SQL del PR desde ecommerce_demo
#    y sobreescribe load-profile.json localmente con el capturedSql del PR.
# 2. Fases 3+4: benchmark en BD espejo con ese SQL + detección de degradaciones.
on:
  pull_request:
    branches: [main, develop, qa]

# Cancela runs anteriores del mismo PR al recibir un nuevo push.
# Evita que una cancelación mid-job deje el pipeline en estado inconsistente.
concurrency:
  group: light-benchmark-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Limpieza ───────────────────────────────────────────────────────────
      # Elimina el contenedor espejo de una ejecución previa fallida.
      - name: Eliminar contenedor espejo previo
        run: docker rm -f cpt-sql-mirror || true

      - name: Limpiar disco (imágenes y volúmenes Docker sin uso)
        run: |
          docker image prune -f
          docker volume prune -f

      # ── Fase 1: compilar y generar queries.json ───────────────────────────────
      # El annotation processor genera loadtest/queries.json con los @SqlQuery/@Req
      # declarados en ProductRepository.
      - name: "Fase 1 — Compilar y generar queries.json"
        run: ./gradlew :sql-testing-demo:compileJava

      # ── Build fat JAR ─────────────────────────────────────────────────────────
      - name: Compilar artefacto ejecutable (fat JAR)
        run: ./gradlew :sql-testing-demo:bootJar

      # ── Fase 2: capturar SQL del PR ───────────────────────────────────────────
      # EcommerceSimulator corre con el código del PR durante 20 s.
      # JdbcWrapper captura el capturedSql que trae el PR y sobreescribe
      # load-profile.json localmente — el del repositorio no se modifica.
      # Esto garantiza que Fase 3+4 ejecuten el SQL del PR, no el de main.
      - name: "Fase 2 — Capturar SQL del PR"
        run: ./gradlew :sql-testing-demo:runSimulator
        env:
          SIMULATION_SECS: "20"
          DB_URL: jdbc:postgresql://localhost:5432/ecommerce_demo
          DB_USER: ${{ secrets.DEMO_DB_USER }}
          DB_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}

      # ── Fases 3 + 4: benchmark y detección de degradaciones ───────────────────
      # BenchmarkMain:
      #   1. Lee load-profile.json (Fase 2)
      #   2. Levanta BD espejo en Docker (MirrorDatabaseProvisioner)
      #   3. Genera datos sintéticos (SyntheticDataGenerator — DPSDG)
      #   4. Ejecuta benchmark con TestProfile "light" (30 s, 10 TPS, UNIFORM)
      #   5. Compara contra baseline.json (DegradationDetector)
      #   6. Sale con código 1 si detecta degradaciones → falla el CI
      - name: "Fases 3+4 — Benchmark y detección de degradaciones"
        run: |
          java -jar sql-testing-demo/build/libs/sql-testing-demo.jar \
            --loadtest.benchmark.testProfile=light \
            --loadtest.synthetic.rowsPerTable=10000 \
            --loadtest.baseline.path=baseline.json \
            --loadtest.mirror.schema.script=sql-testing-demo/src/main/resources/schema-ecommerce.sql
        env:
          GITHUB_SHA: ${{ github.sha }}

      # ── Guardar candidato de baseline en caché ────────────────────────────────
      - name: Guardar candidato de baseline en caché
        if: hashFiles('baseline-candidate.json') != ''
        uses: actions/cache/save@v4
        with:
          path: baseline-candidate.json
          key: baseline-candidate-${{ github.event.pull_request.head.sha }}

      # ── Notificación de advertencias en el PR ─────────────────────────────────
      - name: Publicar advertencias en el PR
        if: always() && hashFiles('benchmark-warnings.txt') != ''
        run: |
          BODY=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" < benchmark-warnings.txt)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $BODY}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"

      # ── Artefactos ────────────────────────────────────────────────────────────
      - name: Publicar artefactos de resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-degradation-${{ github.sha }}
          path: |
            load-profile.json
            baseline.json
            build/results/
            build/validation/
