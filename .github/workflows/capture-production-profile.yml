name: Capture — Production load profile

on:
  workflow_call:
    inputs:
      simulation-secs:
        description: 'Simulation duration in seconds'
        required: false
        type: number
        default: 120
    secrets:
      DB_URL:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true

jobs:
  capture-profile:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Phase 1 — Compile and generate queries.json
        run: ./gradlew compileJava

      - name: Phase 2 — Capture load profile
        run: SIMULATION_SECS=${{ inputs.simulation-secs }} ./gradlew runSimulator
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Verify captured latencies
        run: |
          P95=$(python3 -c "
          import json, sys
          with open('load-profile.json') as f:
              p = json.load(f)
          vals = [q['p95Ms'] for q in p['queries'].values()]
          print(max(vals))
          ")
          echo "Max p95Ms captured: ${P95}ms"
          if [ "$P95" = "0.0" ] || [ "$P95" = "0" ]; then
            echo "All latencies are 0ms — capture failed"
            exit 1
          fi

      - name: Commit load-profile.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f load-profile.json
          git diff --staged --quiet || git commit -m "update: load-profile.json $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
