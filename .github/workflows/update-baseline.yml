name: Baseline — Update post-merge

on:
  workflow_call:
    inputs:
      schema-script:
        description: 'Path to DDL script for the mirror database'
        required: true
        type: string
      jar-path:
        description: 'Path to the executable JAR'
        required: false
        type: string
        default: 'build/libs/app.jar'
      rows-per-table:
        description: 'Synthetic rows per table for the mirror DB'
        required: false
        type: number
        default: 10000
      test-profile:
        description: 'TestProfile to use (light | normal)'
        required: false
        type: string
        default: 'light'

jobs:
  update-baseline:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Remove previous mirror container
        run: docker rm -f cpt-sql-mirror || true

      - name: Prune unused Docker images and volumes
        run: |
          docker image prune -f
          docker volume prune -f

      - name: Build executable JAR
        run: ./gradlew bootJar

      - name: Reset baseline before measurement
        run: rm -f baseline.json

      - name: Run benchmark and update baseline
        run: |
          java -jar ${{ inputs.jar-path }} \
            --loadtest.benchmark.testProfile=${{ inputs.test-profile }} \
            --loadtest.synthetic.rowsPerTable=${{ inputs.rows-per-table }} \
            --loadtest.baseline.path=baseline.json \
            --loadtest.mirror.schema.script=${{ inputs.schema-script }}
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Commit updated baseline
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline.json
          git diff --staged --quiet || git commit -m "chore: update baseline.json post-merge [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
