name: Benchmark — Post-merge (actualiza baseline)

# Corre cuando se integra un PR a develop o main.
# Recupera el candidato de baseline generado en el PR check y lo registra
# en el repositorio — sin volver a ejecutar el benchmark.
on:
  push:
    branches: [main, develop]

jobs:
  actualizar-baseline:
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Identificar el SHA del PR integrado ────────────────────────────────
      # El merge commit tiene dos padres: develop (primero) y el HEAD del PR (segundo).
      - name: Obtener SHA del PR integrado
        id: pr-sha
        run: |
          PR_SHA=$(git log --pretty=format:"%P" -1 | awk '{print $2}')
          echo "sha=$PR_SHA" >> $GITHUB_OUTPUT
          echo "SHA del PR: $PR_SHA"

      # ── 3. Recuperar candidato de baseline ───────────────────────────────────
      - name: Recuperar candidato de baseline desde caché
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: baseline-candidate.json
          key: baseline-candidate-${{ steps.pr-sha.outputs.sha }}

      # ── 4. Registrar baseline actualizado en el repositorio ───────────────────
      # Solo si se encontró el candidato en caché (PR check exitoso previo).
      - name: Registrar baseline actualizado en el repositorio
        if: steps.cache-restore.outputs.cache-hit == 'true'
        run: |
          cp baseline-candidate.json baseline.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline.json
          git diff --staged --quiet || git commit -m "chore: actualizar baseline.json post-merge [skip ci]"
          git push

      # ── 5. Aviso si no se encontró el candidato ───────────────────────────────
      - name: Sin candidato de baseline disponible
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          echo "⚠️ No se encontró candidato de baseline para SHA ${{ steps.pr-sha.outputs.sha }}"
          echo "baseline.json no fue actualizado. Puede ser un push directo sin PR."
