name: Nightly Benchmark — Volume degradation detection

on:
  workflow_call:
    inputs:
      schema-script:
        description: 'Path to DDL script for the mirror database'
        required: true
        type: string
      jar-path:
        description: 'Path to the executable JAR'
        required: false
        type: string
        default: 'build/libs/app.jar'
      rows-per-table:
        description: 'Synthetic rows per table (high volume)'
        required: false
        type: number
        default: 200000

jobs:
  nightly:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Remove previous mirror container
        run: docker rm -f cpt-sql-mirror || true

      - name: Prune unused Docker images and volumes
        run: |
          docker image prune -f
          docker volume prune -f

      - name: Build executable JAR
        run: ./gradlew bootJar

      - name: Nightly benchmark — high volume
        run: |
          java -jar ${{ inputs.jar-path }} \
            --loadtest.benchmark.testProfile=normal \
            --loadtest.synthetic.rowsPerTable=${{ inputs.rows-per-table }} \
            --loadtest.baseline.path=baseline-nightly.json \
            --loadtest.mirror.schema.script=${{ inputs.schema-script }}
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Commit updated nightly baseline
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline-nightly.json
          git diff --staged --quiet || git commit -m "chore: update baseline-nightly.json [skip ci]"
          git push

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-${{ github.sha }}
          path: |
            baseline-nightly.json
            build/results/
            build/validation/
