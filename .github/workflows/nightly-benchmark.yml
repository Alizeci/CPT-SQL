name: Nightly Benchmark — prueba completa

# Corre a medianoche (hora Colombia, UTC-5 → 05:00 UTC) todos los días.
# También puede dispararse manualmente desde la UI de GitHub Actions.
on:
  schedule:
    - cron: '0 5 * * *'     # 00:00 COT = 05:00 UTC
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'SHA del commit a evaluar (vacío = HEAD)'
        required: false
        default: ''

jobs:
  nightly:
    name: Benchmark completo nocturno
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mirror
          POSTGRES_USER: mirror
          POSTGRES_PASSWORD: mirror
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build completo (Fase 1 + compilación)
        run: ./gradlew build --rerun-tasks

      - name: Benchmark nocturno — perfil completo
        env:
          LOADTEST_MIRROR_HOST: localhost
          LOADTEST_MIRROR_PORT: 5433
          LOADTEST_MIRROR_DB: mirror
          LOADTEST_MIRROR_USER: mirror
          LOADTEST_MIRROR_PASSWORD: mirror
          LOADTEST_BENCHMARK_PROFILE_NAME: nightly
          LOADTEST_BENCHMARK_RAMP_UP_SECS: 30
          LOADTEST_BENCHMARK_MEASUREMENT_SECS: 120
          LOADTEST_BENCHMARK_THINK_TIME_MS: 100
          COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
        run: ./gradlew :sql-testing-infrastructure:test --tests "*BenchmarkRunnerIT" --rerun-tasks

      - name: Actualizar baseline.json si PASS
        run: |
          RESULT=$(ls benchmark-nightly-*.json 2>/dev/null | head -1)
          if [ -z "$RESULT" ]; then
            echo "No se generó artefacto — abortando actualización de baseline."
            exit 0
          fi
          VERDICT=$(grep -o '"overallVerdict":"[^"]*"' "$RESULT" | cut -d'"' -f4)
          if [ "$VERDICT" = "PASS" ]; then
            echo "Veredicto PASS — actualizando baseline.json"
            cp "$RESULT" baseline_new.json
            # La actualización real la hace BaselineManager al correr el benchmark
          else
            echo "Veredicto FAIL — baseline.json NO se actualiza."
          fi

      - name: Publicar artefactos del benchmark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-${{ github.sha }}
          path: |
            benchmark-*.json
            baseline.json
          if-no-files-found: ignore

      - name: Commit de baseline.json actualizado
        if: success()
        run: |
          RESULT=$(ls benchmark-nightly-*.json 2>/dev/null | head -1)
          if [ -z "$RESULT" ]; then exit 0; fi
          VERDICT=$(grep -o '"overallVerdict":"[^"]*"' "$RESULT" | cut -d'"' -f4)
          if [ "$VERDICT" != "PASS" ]; then exit 0; fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baseline.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: actualizar baseline.json [nightly ${{ github.sha }}]"
          git push

      - name: Verificar veredicto final
        run: |
          RESULT=$(ls benchmark-nightly-*.json 2>/dev/null | head -1)
          if [ -z "$RESULT" ]; then
            echo "Sin artefacto de benchmark."
            exit 1
          fi
          VERDICT=$(grep -o '"overallVerdict":"[^"]*"' "$RESULT" | cut -d'"' -f4)
          echo "Veredicto nocturno: $VERDICT"
          if [ "$VERDICT" = "FAIL" ]; then
            echo "❌ Nightly FAIL — revisa los artefactos adjuntos."
            exit 1
          fi
          echo "✅ Nightly PASS."
