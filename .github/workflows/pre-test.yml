name: Pre-test — consultas SQL cambiadas

# Disparado en cada push y PR hacia main o develop.
# Solo ejecuta el benchmark sobre las consultas cuyo queryId cambió
# entre el commit actual y el anterior (diff del queries.json de Fase 1).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pre-test:
    name: Benchmark de consultas cambiadas
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: mirror
          POSTGRES_USER: mirror
          POSTGRES_PASSWORD: mirror
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # necesitamos HEAD y HEAD~1 para el diff

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Compilar y generar queries.json (Fase 1)
        run: ./gradlew :sql-testing-domain:compileJava --rerun-tasks

      - name: Detectar queryIds cambiados
        id: diff
        run: |
          PREV_JSON=$(git show HEAD~1:sql-testing-domain/build/classes/java/main/loadtest/queries.json 2>/dev/null || echo '{"queries":[]}')
          CURR_JSON=$(cat sql-testing-domain/build/classes/java/main/loadtest/queries.json)

          # Extrae queryIds del JSON actual
          CURR_IDS=$(echo "$CURR_JSON" | grep -o '"queryId":"[^"]*"' | cut -d'"' -f4 | sort)
          # Extrae queryIds del JSON anterior
          PREV_IDS=$(echo "$PREV_JSON" | grep -o '"queryId":"[^"]*"' | cut -d'"' -f4 | sort)

          # queryIds añadidos o eliminados
          CHANGED=$(diff <(echo "$PREV_IDS") <(echo "$CURR_IDS") | grep '^[<>]' | awk '{print $2}' | sort -u | tr '\n' ',' | sed 's/,$//')

          # Si el JSON cambió estructuralmente, también incluir los que tienen @Req HIGH
          HIGH_IDS=$(echo "$CURR_JSON" | grep -B5 '"priority":"HIGH"' | grep -o '"queryId":"[^"]*"' | cut -d'"' -f4 | tr '\n' ',' | sed 's/,$//')

          ALL_IDS="${CHANGED},${HIGH_IDS}"
          # Eliminar duplicados y comas vacías
          FINAL_IDS=$(echo "$ALL_IDS" | tr ',' '\n' | sort -u | grep -v '^$' | tr '\n' ',' | sed 's/,$//')

          echo "changed_ids=${FINAL_IDS}" >> "$GITHUB_OUTPUT"
          echo "Consultas a ejecutar en pre-test: ${FINAL_IDS}"

      - name: Ejecutar pre-test sobre consultas cambiadas
        if: steps.diff.outputs.changed_ids != ''
        env:
          LOADTEST_MIRROR_HOST: localhost
          LOADTEST_MIRROR_PORT: 5433
          LOADTEST_MIRROR_DB: mirror
          LOADTEST_MIRROR_USER: mirror
          LOADTEST_MIRROR_PASSWORD: mirror
          LOADTEST_BENCHMARK_PROFILE_NAME: pre-test
          LOADTEST_BENCHMARK_RAMP_UP_SECS: 10
          LOADTEST_BENCHMARK_MEASUREMENT_SECS: 30
          LOADTEST_BENCHMARK_THINK_TIME_MS: 50
          LOADTEST_TARGET_QUERY_IDS: ${{ steps.diff.outputs.changed_ids }}
          COMMIT_SHA: ${{ github.sha }}
        run: ./gradlew :sql-testing-infrastructure:test --tests "*BenchmarkRunnerIT" --rerun-tasks

      - name: Publicar resultado como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-test-result-${{ github.sha }}
          path: |
            benchmark-*.json
            baseline.json
          if-no-files-found: ignore

      - name: Verificar veredicto PASS
        if: steps.diff.outputs.changed_ids != ''
        run: |
          RESULT=$(ls benchmark-pre-test-*.json 2>/dev/null | head -1)
          if [ -z "$RESULT" ]; then
            echo "No se generó artefacto de benchmark — sin cambios que evaluar."
            exit 0
          fi
          VERDICT=$(grep -o '"overallVerdict":"[^"]*"' "$RESULT" | cut -d'"' -f4)
          echo "Veredicto: $VERDICT"
          if [ "$VERDICT" = "FAIL" ]; then
            echo "❌ Pre-test FAIL — merge bloqueado. Revisa benchmark-*.json para detalles."
            exit 1
          fi
          echo "✅ Pre-test PASS."
