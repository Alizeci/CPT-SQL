# =============================================================================
# CPT-SQL — Benchmark Runner (BenchmarkMain)
# =============================================================================

# ── Benchmark runner ──────────────────────────────────────────────────────────
# Nombre del perfil de carga (aparece en los artefactos JSON generados)
loadtest.benchmark.profileName=ecommerce-demo

# Perfil de ejecución: light | normal | peak | sustained | wave
# Override desde CI: --loadtest.benchmark.testProfile=peak
loadtest.benchmark.testProfile=light

# Think time entre transacciones (ms)
loadtest.benchmark.thinkTimeMs=50

# Ventana de muestreo para series de tiempo (segundos)
loadtest.benchmark.metricsWindowSecs=10

# ── BD espejo ─────────────────────────────────────────────────────────────────
# MirrorDatabaseProvisioner levanta el contenedor Docker automáticamente
# si no está corriendo. No se requiere configuración manual de Docker.
loadtest.mirror.host=localhost
loadtest.mirror.port=5433
loadtest.mirror.db=mirror
loadtest.mirror.user=mirror
loadtest.mirror.password=mirror
loadtest.mirror.container=cpt-sql-mirror

# Ruta al script DDL del usuario — único insumo requerido por CPT-SQL
loadtest.mirror.schema.script=sql-testing-demo/src/main/resources/schema-ecommerce.sql

# ── Datos sintéticos (SynQB — DPSDG) ─────────────────────────────────────────
loadtest.synthetic.rowsPerTable=200000
loadtest.synthetic.batchSize=500
loadtest.synthetic.seed=42

# ── Umbrales de validación ────────────────────────────────────────────────────
# % mínimo de operaciones dentro del SLA para considerar PASS
loadtest.sla.complianceThresholdPct=90.0

# Tolerancia de regresión sobre el baseline (50% = BASELINE_EXCEEDED si p95 sube >50%)
# Valor alto para evitar ruido en variaciones pequeñas del entorno.
# Solo avisa cuando la degradación vs el histórico es significativa.
loadtest.detector.baselineTolerancePct=0.50

# Tolerancia de cambio de plan de ejecución (20% de incremento en costo)
loadtest.detector.planCostTolerancePct=0.20

# Umbral de proximidad al SLA — bloquea si p95 supera este % del SLA (80% por defecto)
# Previene merges en zona de riesgo antes de que el SLA sea formalmente violado.
loadtest.detector.sloProximityPct=0.80

# Ruta al baseline commiteado en el repositorio
loadtest.baseline.path=baseline.json
